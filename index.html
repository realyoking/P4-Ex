<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P4 AI Master - Multi-Page Edition</title>
    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";
        window.CreateMLCEngine = CreateMLCEngine;
    </script>
    <style>
        :root { --p: #0984e3; --s: #00cec9; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Loading Screen */
        #loader { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .progress-bar { width: 300px; height: 12px; background: #eee; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
        #bar-fill { width: 0%; height: 100%; background: var(--p); transition: 0.3s; }

        /* Page Management */
        .page { flex: 1; display: none; flex-direction: column; padding: 20px; overflow: hidden; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .page.active { display: flex; }
        .card { background: var(--white); border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 100%; overflow: hidden; }

        /* Content Areas */
        #story-display { overflow-y: auto; line-height: 1.8; font-size: 1.15rem; flex: 1; white-space: pre-wrap; }
        #q-list { overflow-y: auto; flex: 1; padding: 10px 0; }
        .q-item { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--s); }
        input { width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #ccc; border-radius: 6px; }

        /* Chat */
        #chat-log { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px; background: #fdfdfd; border: 1px solid #eee; border-radius: 8px; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; }
        .m-ai { background: #f1f2f6; align-self: flex-start; }
        .m-user { background: var(--p); color: white; align-self: flex-end; }

        /* Navigation Controls */
        .nav-bar { display: flex; justify-content: space-between; padding: 15px 20px; background: #fff; border-top: 1px solid #ddd; gap: 10px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--p); color: white; transition: 0.2s; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-s { background: var(--s); }

        .status-pill { font-size: 12px; font-weight: bold; color: var(--p); margin-bottom: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loader">
        <h2>P4 AI Classroom</h2>
        <p id="l-info">Checking WebGPU...</p>
        <div class="progress-bar"><div id="bar-fill"></div></div>
        <button id="go-btn" class="btn" style="display:none" onclick="startSession()">Enter Classroom</button>
    </div>

    <div id="page-reading" class="page active">
        <div class="card">
            <div id="st-reading" class="status-pill">STORY: 0%</div>
            <h2>1. Reading Passage</h2>
            <div id="story-display">Generating your story...</div>
        </div>
    </div>

    <div id="page-questions" class="page">
        <div class="card">
            <div id="st-grammar" class="status-pill">WORKSHEET: 0%</div>
            <h2>2. Grammar Worksheet</h2>
            <div id="q-list">Preparing questions...</div>
        </div>
    </div>

    <div id="page-chat" class="page">
        <div class="card">
            <h2>3. AI Tutor Feedback</h2>
            <div id="chat-log"></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="chat-in" placeholder="Ask a question..." style="margin:0; flex:1;">
                <button class="btn" onclick="sendChat()">Send</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <button id="btn-back" class="btn" onclick="prevPage()" disabled>Back</button>
        <button id="btn-next" class="btn btn-s" onclick="nextPage()">Next: Generate Questions</button>
    </div>

    <script>
        let engine;
        let currentPage = 1;
        const modelId = "Llama-3.2-3B-Instruct-q4f16_1-MLC";

        // Logic from your CamScanner files [cite: 1, 24, 80, 126]
        const TEACHER_PROMPT = `
        You are a P4 English Teacher for Immaculate Heart of Mary School[cite: 1].
        Follow these specific rules:
        - PREPOSITIONS: 'at Easter' , 'on 5th January' [cite: 37], 'on foot' , 'by bus'[cite: 94].
        - PHRASAL VERBS: 'broke down' (car) , 'grow up' [cite: 99], 'fill in' (form) [cite: 52], 'do up' (buttons)[cite: 69].
        - TENSE: Use 'Yesterday' for past tense and 'Soon/Next month' for future[cite: 197, 218].
        - PLACES: Mention Macau, Tai O, or Ngong Ping[cite: 11, 269, 300].
        `;

        async function init() {
            try {
                engine = await window.CreateMLCEngine(modelId, {
                    initProgressCallback: (r) => {
                        const p = Math.round(r.progress * 100);
                        document.getElementById("bar-fill").style.width = p + "%";
                        document.getElementById("l-info").innerText = `Downloading Brain: ${p}%`;
                        if(p === 100) document.getElementById("go-btn").style.display = "block";
                    }
                });
            } catch (e) { document.getElementById("l-info").innerText = "WebGPU Error. Try closing other tabs."; }
        }

        function startSession() {
            document.getElementById("loader").style.display = "none";
            generateStory();
        }

        async function generateStory() {
            document.getElementById("st-reading").innerText = "STORY: Generating...";
            const res = await engine.chat.completions.create({
                messages: [
                    {role: "system", content: TEACHER_PROMPT + " Write a 4-paragraph story about a trip to Macau or Tai O. Include one mention of a car breaking down."},
                    {role: "user", content: "Write the story."}
                ]
            });
            document.getElementById("story-display").innerText = res.choices[0].message.content;
            document.getElementById("st-reading").innerText = "STORY: 100% Ready";
        }

        async function generateQuestions() {
            if (document.getElementById("q-list").innerHTML !== "Preparing questions...") return;
            
            document.getElementById("st-grammar").innerText = "WORKSHEET: Generating...";
            const res = await engine.chat.completions.create({
                messages: [
                    {role: "system", content: TEACHER_PROMPT},
                    {role: "user", content: "Based on the story, make 8 questions: 2 Tense, 3 Prepositions (at/in/on/by), 3 Phrasal Verbs. Use line breaks."}
                ]
            });
            renderQuestions(res.choices[0].message.content);
            document.getElementById("st-grammar").innerText = "WORKSHEET: 100% Ready";
        }

        function renderQuestions(text) {
            const lines = text.split("\n").filter(l => l.length > 5);
            document.getElementById("q-list").innerHTML = lines.map((q, i) => `
                <div class="q-item">
                    <b>Q${i+1}.</b> ${q}
                    <input type="text" class="ans-input">
                </div>
            `).join("");
        }

        function nextPage() {
            if (currentPage === 1) {
                document.getElementById("page-reading").classList.remove("active");
                document.getElementById("page-questions").classList.add("active");
                document.getElementById("btn-back").disabled = false;
                document.getElementById("btn-next").innerText = "Check Work & Talk to AI";
                generateQuestions();
                currentPage = 2;
            } else if (currentPage === 2) {
                document.getElementById("page-questions").classList.remove("active");
                document.getElementById("page-chat").classList.add("active");
                document.getElementById("btn-next").disabled = true;
                checkAnswers();
                currentPage = 3;
            }
        }

        function prevPage() {
            if (currentPage === 2) {
                document.getElementById("page-questions").classList.remove("active");
                document.getElementById("page-reading").classList.add("active");
                document.getElementById("btn-back").disabled = true;
                document.getElementById("btn-next").innerText = "Next: Questions";
                currentPage = 1;
            } else if (currentPage === 3) {
                document.getElementById("page-chat").classList.remove("active");
                document.getElementById("page-questions").classList.add("active");
                document.getElementById("btn-next").disabled = false;
                currentPage = 2;
            }
        }

        async function checkAnswers() {
            addMsg("I am checking your P4 worksheet now...", "m-ai");
            const answers = Array.from(document.querySelectorAll(".ans-input")).map(i => i.value).join(" | ");
            const res = await engine.chat.completions.create({
                messages: [
                    {role: "system", content: TEACHER_PROMPT},
                    {role: "user", content: "Correct these answers: " + answers + ". Explain the rules for 'at Easter' and 'on foot' if they were wrong."}
                ]
            });
            addMsg(res.choices[0].message.content, "m-ai");
        }

        async function sendChat() {
            const input = document.getElementById("chat-in");
            if (!input.value) return;
            const text = input.value;
            addMsg(text, "m-user");
            input.value = "";
            const res = await engine.chat.completions.create({
                messages: [{role: "system", content: TEACHER_PROMPT}, {role: "user", content: text}]
            });
            addMsg(res.choices[0].message.content, "m-ai");
        }

        function addMsg(txt, cls) {
            const log = document.getElementById("chat-log");
            log.innerHTML += `<div class="msg ${cls}">${txt}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        window.onload = init;
    </script>
</body>
</html>
