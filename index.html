<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI P4 Adventure</title>
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";
        window.webllm = webllm;
    </script>
    <style>
        :root { --p: #FF6B6B; --s: #4ECDC4; --a: #FFE66D; --w: #FFFFFF; --t: #2F2F2F; }
        body { font-family: 'Comic Sans MS', cursive; background: #f0f8ff; margin: 0; color: var(--t); }
        
        /* Home Screen */
        #home-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-img { width: 150px; height: 150px; margin-bottom: 20px; }
        
        /* Layout */
        #app-container { display: none; height: 100vh; flex-direction: column; }
        .navbar { background: var(--w); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--s); }
        
        .split-view { display: flex; flex: 1; overflow: hidden; }
        .reading-pane { flex: 1.2; padding: 30px; overflow-y: auto; background: #fffaf0; border-right: 4px dashed var(--s); }
        .question-pane { flex: 1; padding: 30px; overflow-y: auto; background: var(--w); }

        /* Story Styles */
        .story-text { line-height: 1.8; font-size: 1.1rem; }
        .real-img { width: 100%; height: 250px; object-fit: cover; border-radius: 20px; margin-bottom: 20px; border: 4px solid var(--w); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Question Styles */
        .q-card { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 20px; border-left: 5px solid var(--a); }
        input[type="text"], textarea { width: 90%; padding: 10px; border: 2px solid #ddd; border-radius: 10px; margin: 10px 0; }
        
        .btn { padding: 12px 25px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.2s; margin: 5px; }
        .btn-p { background: var(--p); color: white; }
        .btn-s { background: var(--s); color: white; }
        .btn-a { background: var(--a); color: var(--t); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        #ai-feedback { background: #e0f7fa; padding: 15px; border-radius: 15px; margin-top: 10px; display: none; border: 2px solid var(--s); }
        
        .loading-overlay { display: none; position: fixed; top: 0; left:0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 100; justify-content: center; align-items: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">🤖 AI is thinking... please wait...</div>

    <div id="home-screen">
        <svg class="hero-img" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="#FFE66D"/><path d="M20 26c2 0 4 2 4 4s-2 4-4 4-4-2-4-4 2-4 4-4zm24 0c2 0 4 2 4 4s-2 4-4 4-4-2-4-4 2-4 4-4z" fill="#2F2F2F"/><path d="M32 48c-8 0-12-4-12-4s4 8 12 8 12-8 12-8-4 4-12 4z" fill="#FF6B6B"/></svg>
        <h1>My AI English Tutor</h1>
        <p id="status">Click to initialize your AI Brain</p>
        <button class="btn btn-p" style="font-size: 1.5rem;" onclick="initAI()">Initialize AI & Start ➔</button>
    </div>

    <div id="app-container">
        <div class="navbar">
            <span style="font-weight: bold; color: var(--p);">P4 Mission Control</span>
            <div>
                <button class="btn btn-a" onclick="location.reload()">🏠 Home</button>
                <button class="btn btn-s" onclick="generateNewContent()">🆕 New Reading & Questions</button>
            </div>
        </div>

        <div class="split-view">
            <div class="reading-pane">
                <img id="story-img" src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800" class="real-img">
                <h2 id="story-title">Loading Story...</h2>
                <div id="story-body" class="story-text"></div>
            </div>

            <div class="question-pane">
                <h3>Your Tasks</h3>
                <div id="question-list"></div>
                
                <div id="ai-feedback"></div>
                
                <div style="margin-top: 20px;">
                    <button class="btn btn-p" id="check-btn" onclick="aiEvaluate()">🤖 AI: Check My Answers & Improve</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let engine;
        const loading = document.getElementById('loading');

        // 1. QUESTION API (Local Data Bank)
        const api = {
            tenses: [
                { q: "Yesterday, Tim ____ (go) to the park.", a: "went", h: "Past tense of go." },
                { q: "We ____ (visit) Japan next year.", a: "will visit", h: "Future plan." },
                { q: "She ____ (be) a student in P4.", a: "is", h: "Present simple." },
                { q: "They ____ (eat) dinner now.", a: "are eating", h: "Happening now." },
                { q: "Last week, I ____ (break) my toy.", a: "broke", h: "Past tense." }
            ],
            prepositions: [
                { q: "The car broke ____ on the highway.", a: "down", h: "Phrasal verb for stopping." },
                { q: "We celebrate Christmas ____ December.", a: "in", h: "Months take 'in'." },
                { q: "The bus arrived ____ the station.", a: "at", h: "Specific points." },
                { q: "I am interested ____ science.", a: "in", h: "Adjective + Prep." }
            ]
        };

        async function initAI() {
            document.getElementById('status').innerText = "Downloading AI Model (may take a minute)...";
            try {
                engine = await window.webllm.CreateMLCEngine("Llama-3-8B-Instruct-v3-q4f16_1-MLC");
                document.getElementById('home-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                generateNewContent();
            } catch (e) {
                alert("WebGPU not detected. Please use Chrome/Edge on Desktop.");
            }
        }

        async function generateNewContent() {
            loading.style.display = 'flex';
            
            // Randomly choose a theme for the reading
            const themes = ["Space Adventure", "Deep Sea Discovery", "The Magic Zoo", "A Day in 2073", "Robot School"];
            const theme = themes[Math.floor(Math.random() * themes.length)];
            
            // 1. AI Generate Reading
            const prompt = `Write a 5-paragraph story for a 10-year-old child about "${theme}". 
                           Make it educational but fun. Use no emojis. 
                           Format: Start with [TITLE] then the text.`;
            
            const reply = await engine.chat.completions.create({ messages: [{role: "user", content: prompt}] });
            const text = reply.choices[0].message.content;
            
            document.getElementById('story-title').innerText = theme;
            document.getElementById('story-body').innerText = text;
            
            // Update Image based on theme
            const imgKeywords = { "Space": "space", "Sea": "ocean", "Zoo": "animals", "2073": "future", "Robot": "robot" };
            const keyword = Object.keys(imgKeywords).find(k => theme.includes(k)) || "nature";
            document.getElementById('story-img').src = `https://source.unsplash.com/featured/?${keyword}`;

            // 2. Load Questions from API
            loadQuestions();
            
            loading.style.display = 'none';
        }

        function loadQuestions() {
            const list = document.getElementById('question-list');
            list.innerHTML = "";
            
            // Get 3 random grammar and 1 reading comprehension
            const grammar = [...api.tenses, ...api.prepositions].sort(() => 0.5 - Math.random()).slice(0, 3);
            
            grammar.forEach((item, i) => {
                list.innerHTML += `
                    <div class="q-card">
                        <p><b>Q${i+1}:</b> ${item.q}</p>
                        <input type="text" class="student-ans" data-correct="${item.a}" placeholder="Type answer...">
                        <button class="btn btn-a" style="font-size:0.7rem;" onclick="alert('Hint: ${item.h}')">Hint</button>
                    </div>`;
            });

            list.innerHTML += `
                <div class="q-card">
                    <p><b>Q4:</b> Write a long sentence about what happened in the story.</p>
                    <textarea class="student-ans" rows="3" placeholder="Explain here..."></textarea>
                </div>`;
        }

        async function aiEvaluate() {
            loading.style.display = 'flex';
            const answers = Array.from(document.querySelectorAll('.student-ans')).map(i => i.value);
            const story = document.getElementById('story-body').innerText;
            
            const prompt = `You are a P4 English Teacher. 
                           Story: ${story}
                           Student Answers: ${answers.join(" | ")}
                           Please check these. If they are wrong, explain the rule (like past tense or prepositions) and give advice on how to improve. Be encouraging!`;

            const reply = await engine.chat.completions.create({ messages: [{role: "user", content: prompt}] });
            
            const feedback = document.getElementById('ai-feedback');
            feedback.style.display = 'block';
            feedback.innerText = reply.choices[0].message.content;
            loading.style.display = 'none';
            feedback.scrollIntoView();
        }
    </script>
</body>
</html>
