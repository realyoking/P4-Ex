<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P4 Ultimate: Save & JSON Hub</title>
    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";
        window.CreateMLCEngine = CreateMLCEngine;
    </script>
    <style>
        :root { --p: #0984e3; --s: #00cec9; --bg: #f1f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #loader { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .bar-bg { width: 300px; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin: 20px; }
        #bar { width: 0%; height: 100%; background: var(--p); transition: 0.3s; }

        .workspace { flex: 1.6; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; background: #ddd; font-weight: bold; }
        .tab-btn.active { background: var(--p); color: white; }

        /* JSON Editor */
        #json-editor { width: 100%; height: 300px; font-family: monospace; font-size: 0.85rem; padding: 10px; border: 2px solid #ccc; border-radius: 8px; }

        /* Questions */
        .q-item { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid var(--p); margin-bottom: 12px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-top: 8px; box-sizing: border-box; }

        .sidebar { width: 380px; background: white; border-left: 2px solid #ddd; display: flex; flex-direction: column; }
        #chat-log { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px; border-radius: 8px; max-width: 85%; font-size: 0.9rem; }
        .ai { background: #e3f2fd; align-self: flex-start; }
        .user { background: var(--p); color: white; align-self: flex-end; }

        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: var(--p); color: white; }
        .btn-save { background: #27ae60; }
        .btn-load { background: #f39c12; }
    </style>
</head>
<body>

    <div id="loader">
        <h2>Initializing P4 Master Hub...</h2>
        <div class="bar-bg"><div id="bar"></div></div>
        <button class="btn" id="go-btn" style="display:none" onclick="document.getElementById('loader').style.display='none'">Start Lesson</button>
    </div>

    <div class="workspace">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('grammar')">100 Sentences</button>
            <button class="tab-btn" onclick="showTab('reading')">Custom Reading (JSON)</button>
        </div>

        <div id="tab-grammar" class="tab-content">
            <div class="card">
                <h3>P4 Grammar Bank</h3>
                <div id="grammar-list"></div>
                <div style="display:flex; justify-content: space-between; margin-top:15px;">
                    <button class="btn btn-save" onclick="saveAll()">Save Progress</button>
                    <button class="btn btn-load" onclick="loadAll()">Load Progress</button>
                    <button class="btn" style="background:var(--s)" onclick="analyzeGrammar()">Analyze Answers</button>
                </div>
            </div>
        </div>

        <div id="tab-reading" class="tab-content" style="display:none">
            <div class="card">
                <h3>Reading JSON Editor</h3>
                <textarea id="json-editor"></textarea>
                <button class="btn" style="margin-top:10px;" onclick="renderReading()">Update Reading from JSON</button>
            </div>
            <div id="reading-display" class="card" style="margin-top:20px; display:none;">
                <div id="reading-story" style="font-size: 1.1rem; line-height: 1.6; border-bottom: 1px solid #eee; padding-bottom: 15px;"></div>
                <div id="reading-qs" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div style="padding:15px; font-weight:bold; border-bottom:1px solid #ddd;">AI Super Tutor</div>
        <div id="chat-log"><div class="bubble ai">System Ready. You can save your progress to your browser, or paste your own JSON reading questions!</div></div>
        <div style="padding:10px; display:flex; gap:5px;"><input type="text" id="c-in" style="flex:1;"><button class="btn" onclick="ask()">Ask</button></div>
    </div>

<script>
    let engine;
    const modelId = "Llama-3.2-3B-Instruct-q4f16_1-MLC";
    
    // Default JSON Template
    const defaultJSON = {
        "story": "Last Easter, my family went to Tai O. We traveled by ferry and explored the village on foot...",
        "mcqs": [
            {"q": "1. How did they go to Tai O?", "options": ["By bus", "By ferry", "On foot"], "ans": "By ferry"},
            {"q": "2. When did they go?", "options": ["At Christmas", "At Easter", "In summer"], "ans": "At Easter"}
        ],
        "long_qs": [
            {"q": "11. Describe the stilt houses they saw.", "ans": ""},
            {"q": "12. Why did the car break down?", "ans": ""}
        ]
    };

    // 100 Sentences Array (Shortened for display code, but fully logic-ready)
    const sentences = [
    "1. We always eat chocolate eggs and have a big dinner _____ Easter.",
    "2. My cousin Tim goes to school _____ foot because it is near his home.",
    "3. Last Sunday, my father's car suddenly _____ down on the bridge.",
    "4. I want to _____ up and be a famous pilot one day.",
    "5. Please _____ in your name and phone number on this application form.",
    "6. We went to Ngong Ping _____ cable car to see the Big Buddha.",
    "7. You must _____ up your buttons before you go out in the cold wind.",
    "8. Sixty years ago, many people in Tai O lived in _____ houses.",
    "9. We went to the Peak _____ bus to see the magnificent night view.",
    "10. My sister was born _____ 5th January, which is in winter.",
    "11. Hurry _____! The school bus is leaving the station now.",
    "12. We saw many boats resting in the typhoon _____ last night.",
    "13. I am very interested _____ learning about the history of Macau.",
    "14. My mother bought a new _____ player so we can watch movies at home.",
    "15. Last week, we _____ (visit) the Space Museum with our teacher.",
    "16. The weather _____ (be) very sunny and hot during the summer holiday.",
    "17. Sixty years ago, there _____ (not be) any mobile phones in Hong Kong.",
    "18. I _____ (not see) the Big Buddha when I went to Ngong Ping last year.",
    "19. We arrived _____ the airport two hours before our flight to Japan.",
    "20. My cousin is very good _____ playing the piano and singing songs.",
    "21. We sat on the _____ to wait for the ferry to arrive.",
    "22. The view of the Victoria Harbour at night is truly _____.",
    "23. Don't give _____! You can finish the English worksheet soon.",
    "24. I stayed _____ home all day because it was raining heavily.",
    "25. Yesterday, my mother _____ (be) very tired after a long day of work.",
    "26. We _____ (go) to the beach last Saturday and swam in the sea.",
    "27. I _____ (write) a letter to my aunt in Canada two days ago.",
    "28. My grandfather _____ (buy) a new television set last night.",
    "29. We _____ (eat) some delicious seafood during our trip to Tai O.",
    "30. The students _____ (be) happy because there was no school yesterday.",
    "31. I liked playing with toy cars when I _____ (be) a little boy.",
    "32. Last Chinese New Year, we _____ (visit) our relatives in Tai Po.",
    "33. My sister _____ (cry) because she lost her favorite doll yesterday.",
    "34. The weather _____ (be) sunny during our school picnic last week.",
    "35. We _____ (see) many stars in the sky when we went camping.",
    "36. I _____ (do) my homework in the library after school yesterday.",
    "37. The movie _____ (start) at seven o'clock, so we were late.",
    "38. I _____ (feel) very excited when I won the competition yesterday.",
    "39. They _____ (not be) at home when I called them last night.",
    "40. Did you _____ (have) fun at Ocean Park last Sunday?",
    "41. We usually go to the library _____ Saturdays to read books.",
    "42. My brother likes to listen _____ music in his bedroom.",
    "43. Look _____! There is a car coming very fast.",
    "44. Please turn _____ the lights before you leave the classroom.",
    "45. I am looking _____ my lost keys. Have you seen them?",
    "46. We walked _____ the pier to catch the ferry to Central.",
    "47. My uncle lives _____ a big flat in Shatin.",
    "48. The cat is hiding _____ the table because it is scared.",
    "49. We put the rubbish _____ the bin to keep the park clean.",
    "50. I want to go to the supermarket _____ my mother today.",
    "51. There are many tall buildings _____ Hong Kong Island.",
    "52. We saw a magnificent _____ from the top of the mountain.",
    "53. My car _____ down, so I had to call a mechanic for help.",
    "54. When I _____ up, I want to travel around the world.",
    "55. Can you help me _____ in this crossword puzzle?",
    "56. It is important to _____ up your jacket when it is snowing.",
    "57. I was born _____ October, which is a beautiful month.",
    "58. We go to the airport _____ taxi because we have many bags.",
    "59. The boats in the typhoon shelter look very small _____ the Peak.",
    "60. My cousin is afraid _____ spiders and snakes.",
    "61. We had a picnic _____ the park last Sunday afternoon.",
    "62. I am good _____ Maths but I need to study harder for English.",
    "63. The ferry arrived _____ the pier exactly at ten o'clock.",
    "64. We stayed _____ a hotel during our holiday in Japan.",
    "65. Last night, I _____ (watch) a funny cartoon on television.",
    "66. She _____ (not go) to school because she had a fever.",
    "67. We _____ (take) many photos of the stilt houses in Tai O.",
    "68. My father _____ (cook) a delicious dinner for us yesterday.",
    "69. Did you _____ (finish) your breakfast this morning?",
    "70. I _____ (be) a P1 student three years ago.",
    "71. We _____ (not have) any electronic games sixty years ago.",
    "72. They _____ (travel) to Macau by ferry last month.",
    "73. I _____ (see) a magnificent view of the harbour yesterday.",
    "74. The train _____ (leave) the station five minutes ago.",
    "75. We _____ (walk) to the park because it was a sunny day.",
    "76. He _____ (give) me a beautiful birthday present last week.",
    "77. I _____ (not like) eating vegetables when I was five.",
    "78. Did she _____ (tell) you about the school trip?",
    "79. We _____ (buy) some dried seafood in Tai O yesterday.",
    "80. The children _____ (be) very noisy in the playground just now.",
    "81. Correct: i live in hong kong with my family.",
    "82. Correct: peters mum is a very kind teacher.",
    "83. Correct: macau is a beautiful place to visit.",
    "84. Correct: ouch cried the little boy.",
    "85. Correct: we went to ocean park last sunday.",
    "86. Correct: my birthday is in february.",
    "87. Correct: where are you going asked mr chan?",
    "88. Correct: help shouted the man on the boat.",
    "89. Correct: its a sunny day today.",
    "90. Correct: dont run in the corridor.",
    "91. The view from the Peak is truly _____.",
    "92. We saw many _____ houses in Tai O.",
    "93. The boats stay in the typhoon _____ during a storm.",
    "94. The car _____ down on the way to the airport.",
    "95. We travel to Macau _____ ferry.",
    "96. I go to school _____ foot.",
    "97. We have a holiday _____ Easter.",
    "98. I was born _____ 12th May.",
    "99. Hurry _____ or we will be late for school.",
    "100. I want to be a pilot when I _____ up."
];
    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + t).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    function renderGrammar() {
        const list = document.getElementById("grammar-list");
        let html = "";
        for(let i=0; i<100; i++) {
            const txt = sentences[i] || `P4 Mastery Sentence #${i+1}: Please complete the sentence correctly.`;
            html += `<div class="q-item"><b>Q${i+1}:</b> ${txt}<input type="text" class="g-ans" id="g${i}"></div>`;
        }
        list.innerHTML = html;
    }

    function renderReading() {
        try {
            const data = JSON.parse(document.getElementById("json-editor").value);
            document.getElementById("reading-display").style.display = "block";
            document.getElementById("reading-story").innerText = data.story;
            
            let qsHtml = "<h4>Multiple Choice</h4>";
            data.mcqs.forEach((m, i) => {
                qsHtml += `<div class='q-item'><b>${m.q}</b><br>` + 
                    m.options.map(o => `<input type='radio' name='mcq${i}'> ${o} `).join("") + `</div>`;
            });
            
            qsHtml += "<h4>Short & Long Questions</h4>";
            data.long_qs.forEach((l, i) => {
                qsHtml += `<div class='q-item'><b>${l.q}</b><textarea class='r-ans'></textarea></div>`;
            });
            document.getElementById("reading-qs").innerHTML = qsHtml;
        } catch(e) { alert("JSON Error! Please check your format."); }
    }

    // SAVE & LOAD SYSTEM
    function saveAll() {
        const answers = Array.from(document.querySelectorAll(".g-ans")).map(i => i.value);
        localStorage.setItem("p4_progress", JSON.stringify(answers));
        localStorage.setItem("p4_json", document.getElementById("json-editor").value);
        addMsg("Progress saved to your browser!", "ai");
    }

    function loadAll() {
        const saved = JSON.parse(localStorage.getItem("p4_progress"));
        if(saved) {
            document.querySelectorAll(".g-ans").forEach((input, i) => input.value = saved[i] || "");
            addMsg("Progress loaded!", "ai");
        }
    }

    async function init() {
        renderGrammar();
        document.getElementById("json-editor").value = JSON.stringify(defaultJSON, null, 2);
        try {
            engine = await window.CreateMLCEngine(modelId, { initProgressCallback: (r) => { 
                document.getElementById("bar").style.width = (r.progress*100)+"%"; 
                if(r.progress===1) document.getElementById("go-btn").style.display="block"; 
            }});
        } catch(e) { document.getElementById("loader").innerText = "WebGPU Required!"; }
    }

    async function analyzeGrammar() {
        const a = Array.from(document.querySelectorAll(".g-ans")).map((i, idx) => `Q${idx+1}:${i.value}`).join("|");
        const res = await engine.chat.completions.create({ messages: [{role:"system", content:"P4 Tutor"}, {role:"user", content:"Check these: " + a}] });
        addMsg(res.choices[0].message.content, "ai");
    }

    async function ask() {
        const i = document.getElementById("c-in"); if(!i.value) return;
        addMsg(i.value, "user");
        const res = await engine.chat.completions.create({ messages: [{role:"system", content:"P4 Teacher"}, {role:"user", content:i.value}] });
        addMsg(res.choices[0].message.content, "ai"); i.value = "";
    }

    function addMsg(t, c) { const l = document.getElementById("chat-log"); l.innerHTML += `<div class="bubble ${c}">${t}</div>`; l.scrollTop = l.scrollHeight; }
    window.onload = init;
</script>
</body>
</html>
